<!DOCTYPE html>
<html>
<head>
<title>Latihan CSS Dasar Lengkap</title>

<style>
/* =========================
   CSS COMMENTS
========================= */
/* Ini contoh komentar CSS */

/* =========================
   CSS ERRORS (contoh salah)
   colr: red;
========================= */

/* =========================
   CSS COLORS
========================= */
h1 {
  color: navy;
}

p {
  color: black;
}

/* =========================
   CSS BACKGROUNDS
========================= */
body {
  background-color: pink;
}

/* =========================
   CSS BORDERS
========================= */
.box {
  border: 2px solid black;
  border-radius: 10px;
}

/* =========================
   CSS MARGINS
========================= */
.box {
  margin: 20px;
}

/* =========================
   CSS PADDING
========================= */
.box {
  padding: 15px;
}

/* =========================
   CSS HEIGHT / WIDTH
========================= */
.box {
  width: 200px;
  height: 100px;
}

/* =========================
   CSS BOX MODEL
========================= */
.box {
  border: 2px blue;
  padding: 10px;
  margin: 10px;
}

/* =========================
   CSS OUTLINE
========================= */
.box {
  outline: 2px solid black;
}

/* =========================
   CSS TEXT
========================= */
.text {
  text-align: center;
  text-decoration: underline;
  text-transform: uppercase;
}

/* =========================
   CSS FONTS
========================= */
body {
  font-family: "Courier New";
  font-size: 16px;
}

/* =========================
   CSS ICONS
========================= */
.icon {
  font-size: 30px;
  color: green;
}

/* =========================
   CSS LINKS
========================= */
a:link {
  color: blue;
}

a:hover {
  color: red;
}

a:visited {
  color: purple;
}

/* =========================
   CSS LISTS
========================= */
ul {
  list-style-type: square;
}

/* =========================
   CSS TABLES
========================= */
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid black;
  padding: 8px;
}

th {
  background-color: gray;
  color: white;
}
</style>

</head>
<body>

<!-- =========================
     IDENTITAS
========================= -->
<h1>Identitas Mahasiswa</h1>
<p>Nama: Binti Nur Hamidah</p>
<p>NIM: 240631100075</p>
<p>Kelas: 4C</p>

<!-- =========================
     BOX MODEL
========================= -->
<div class="box">
  Contoh Box Model
</div>

<!-- =========================
     TEXT
========================= -->
<p class="text">Contoh CSS Text</p>

<!-- =========================
     ICON
========================= -->
<script 
src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<p>Contoh icon:</p>
<i class="fas fa-cloud"></i>
<i class="fas fa-heart"></i>
<i class="fas fa-car"></i>
<i class="fas fa-file"></i>
<i class="fas fa-heart"></i>

<!-- =========================
     LINKS
========================= -->
<p>
  <a href="https://youtu.be/F7sGJVUrkjQ?si=S2YN92FkBHO70mF_">
    H2H - Rude
  </a>
</p>

<!-- =========================
     LISTS
========================= -->
<ul>
  <li>Senin</li>
  <li>Selasa</li>
</ul>

<!-- =========================
     TABLES
========================= -->
<table>
  <tr>
    <th>No</th>
    <th>Nama</th>
  </tr>
  <tr>
    <td>1</td>
    <td>Binti</td>
  </tr>
</table>

</body>
</html>
