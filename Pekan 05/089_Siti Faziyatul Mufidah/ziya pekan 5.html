<!DOCTYPE html>
<html>
<head>
  <style>
    /* CSS Comments - komentar tidak tampil di browser */

    body {
      /* CSS Colors */
      color: #333333;
      background-color: #f0f0f0; /* CSS Backgrounds */
    }

    .kotak {
      /* CSS Borders */
      border: 2px solid blue;

      /* CSS Margins - jarak luar elemen */
      margin: 20px;

      /* CSS Padding - jarak dalam elemen */
      padding: 15px;

      /* CSS Height / Width */
      width: 300px;
      height: 150px;

      /* CSS Box Model */
      box-sizing: border-box;

      /* CSS Outline */
      outline: 2px dashed red;
    }

    /* CSS Text */
    h1 {
      text-align: center;
      text-decoration: underline;
    }

    /* CSS Fonts */
    p {
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
    }

    /* CSS Links */
    a {
      color: kuning;
      text-decoration: none;
    }
    a:hover {
      color: hijau;
    }

    /* CSS Lists */
    ul {
      list-style-type: square;
      padding-left: 20px;
    }

    /* CSS Tables */
    table {
      border-collapse: collapse;
      width: 100%;
    }
    td, th {
      border: 1px solid black;
      padding: 8px;
      text-align: left;
    }
  </style>
</head>
<body>

  <h1>Belajar CSS</h1>

  <div class="kotak">
    <p>Ini adalah kotak dengan margin, padding, dan border.</p>
  </div>

  <a href="#">Ini link CSS</a>

  <ul>
    <li>Item 1</li>
    <li>Item 2</li>
  </ul>

  <table>
    <tr>
      <th>Nama</th>
      <th>Nilai</th>
    </tr>
    <tr>
      <td>Ziya</td>
      <td>89</td>
    </tr>
  </table>

</body>
</html
